<!DOCTYPE html>
<html>
    <head>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
        <style>
            input, textarea {
                background-color: black;
                color: white
            }
            #box div {
                background-color: black;
                display: flex;
                justify-content: space-between;
                margin: 8px 0;
                padding-top: 50px;
                padding-right: 30px;
                padding-bottom: 50px;
                padding-left: 80px;
                border: 2px solid rgb(255, 255, 255);
                border-radius: 15px 50px;
            }
            body {
                text-align: center;
                font-family: "Space Grotesk", sans-serif;
                color: rgb(255, 255, 255);
                font-optical-sizing: auto;
                font-style: normal;
            }

        </style>
    </head>
    <body style="background-color: rgb(11, 10, 10);">
            <h1>Audran's Habit Tracker</h1>
            <h2>CAN'T RUSH GREATNESS</h2>
            <input type="text" id="input" value="" size="25" placeholder="ENTER HABIT">
            <input type="number" id="intinput" size="25" placeholder="Enter Frequency">
            <button type="button" id="button" value="button" type="button" id="button">ENTER</button>
            <div id="box" class="box"></div>
        <script>
            const button = document.querySelector("#button")

            button.addEventListener("click", async () =>{
                const response = await fetch("http://127.0.0.1:5000/add", {
                    method: "POST",
                    headers: { 
                        "Content-Type": "application/json" },
                    body: JSON.stringify({
                        habit: input.value,
                        per_week: intinput.value,
                        left: intinput.value,
                        streak: ""
                    })
                });
                const data = await response.json()
                box.innerHTML = data
                renderHabits(data)
            });

            window.addEventListener("load", async (event) => {
                const response = await fetch("http://127.0.0.1:5000/read_habits", {
                    method: "GET",
                })
                const data = await response.json()
                box.innerHTML = data
                renderHabits(data)
            });

            function renderHabits(habits) {
                box.innerHTML = ""
                habits.forEach((habit, index) =>{
                    const row = document.createElement("div");
                    const span = document.createElement("span");

                span.textContent = `${habit.habit} - Goal: ${habit.per_week} days - | Left: ${habit.left} ||| STREAK: ${habit.streak}`;

                    const delbutton = document.createElement("button");
                    //chnage button color AND text color:
                    delbutton.style.backgroundColor = "red"
                    delbutton.style.color ="white"
                    const donebutton = document.createElement("button");
                    donebutton.style.backgroundColor = "green"
                    donebutton.style.color ="white"
                    const adddaybutton = document.createElement("button");
                    adddaybutton.style.backgroundColor = "orange"
                    adddaybutton.style.color = "white"
                    const streakbutton = document.createElement("button");
                    streakbutton.style.backgroundColor = "purple"
                    streakbutton.style.color ="white"

                    delbutton.innerText ="Delete",
                    donebutton.innerText ="Done For Today"
                    adddaybutton.innerText = "Add a Day"
                    streakbutton.innerText ="I'M ON A STREAK (2 or more days)"

                    
                    row.appendChild(span);
                    row.appendChild(delbutton);
                    row.append(donebutton);
                    row.append(adddaybutton);
                    row.append(streakbutton);

                    box.appendChild(row)

                    delbutton.addEventListener("click", async () => {
                        const response = await fetch("http://127.0.0.1:5000/delete", {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json"
                            },
                            body: JSON.stringify({"index": index})
                        });
                        const data = await response.json()
                        renderHabits(data)
                    })
                    donebutton.addEventListener("click", async () => {
                        const response = await fetch("http://127.0.0.1:5000/done", {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json"
                            },
                            body: JSON.stringify({"index": index})
                        });
                        const data = await response.json()
                        renderHabits(data)
                    })
                    adddaybutton.addEventListener("click", async () =>{
                        const response = await fetch("http://127.0.0.1:5000/increment", {
                            method: "POST", 
                            headers: {
                                "Content-Type": "application/json"
                            },
                            body: JSON.stringify({"index": index})
                        });
                        const data = await response.json()
                        renderHabits(data)
                    })
                    streakbutton.addEventListener("click", async () => {
                        const response = await fetch("http://127.0.0.1:5000/streak", {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json"
                            },
                            body: JSON.stringify({"index": index})
                            
                        })
                        const data = await response.json()
                        renderHabits(data)
                    })
                })
            }

                

        
        </script>
    </body>
</html>
